<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; }
        .header { background-color: #e76f51; padding: 24px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 22px; }
        .body { padding: 32px; color: #333333; }
        .body h2 { font-size: 18px; margin-bottom: 8px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eeeeee; }
        .detail-label { color: #777777; font-size: 14px; }
        .detail-value { font-weight: bold; font-size: 14px; }
        .info-box { background-color: #fff3e0; border-left: 4px solid #e76f51; padding: 16px; border-radius: 4px; margin: 20px 0; font-size: 14px; }
        .footer { background-color: #f4f4f4; text-align: center; padding: 16px; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ShopFlow</h1>
    </div>
    <div class="body">
        <h2 th:text="'Hi ' + ${fullName} + ','">Hi User,</h2>
        <p>Your return request has been approved and a refund has been initiated.</p>
        <div class="detail-row">
            <span class="detail-label">Order ID</span>
            <span class="detail-value" th:text="${orderId}">—</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Refund Amount</span>
            <span class="detail-value" th:text="'₹' + ${refundAmount}">—</span>
        </div>
        <div class="info-box">
            Refunds typically reflect in your account within 5–7 business days depending on your bank or payment provider.
        </div>
    </div>
    <div class="footer">
        &copy; ShopFlow. All rights reserved.
    </div>
</div>
</body>
</html>
