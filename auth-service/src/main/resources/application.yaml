server:
  port: 8081

spring:
  application:
    name: auth-service

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: Murali@3824
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Cloud Config (disabled until config-server is ready) ────
  cloud:
    config:
      enabled: false                       # enable when config-server is running

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ── Eureka ──────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ── JWT ─────────────────────────────────────────────────────────
application:
  jwt:
    secret: "a8F#kL92!xQwZ@7mP$eR3vT6yU1bC0dE"
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days

  otp:
    expiry-minutes: 5                     # Redis TTL for OTP keys

# ── Actuator (Eureka health endpoint) ───────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ── Logging ─────────────────────────────────────────────────────
logging:
  level:
    com.shopflow.auth: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO